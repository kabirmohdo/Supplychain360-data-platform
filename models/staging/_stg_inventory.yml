version: 2

models:
  - name: stg_inventory
    description: "staging layer view of inventory levels."
    columns:
      - name: warehouse_id
        description: "Foreign key for the warehouse."
        tests:
          - relationships:
              to: ref('stg_warehouses')
              field: warehouse_id

      - name: product_id
        description: "Foreign key for the product."
        tests:
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: quantity_available
        description: "Number of units currently in stock."

      - name: reorder_threshold
        description: "Safety stock level for reordering."
        
      - name: snapshot_date
        description: "Date of the inventory record."