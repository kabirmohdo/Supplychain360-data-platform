version: 2

models:
  - name: stg_suppliers
    description: "staging layer view of supplier reference data."
    columns:
      - name: supplier_id
        description: "Primary key for the supplier."
        tests:
          - unique
          - not_null
      
      - name: supplier_name
        description: "Name of the supplier organization."
      
      - name: category
        description: "The industry category the supplier belongs to."
      
      - name: country
        description: "The country where the supplier is based."